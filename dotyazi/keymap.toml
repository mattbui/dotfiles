[mgr]
prepend_keymap = [
	# Clear in priority order: highlights > visual selection > filter > selection > yank/cut > search > close
	{ on = "<Esc>", run = "plugin smart-clear", desc = "Clear highlight/filter/selection or close" },

	{ on = "<C-q>", run = "close", desc = "Close the current tab or quit" },
	{ on = "<C-c>", run = "close", desc = "Close the current tab or quit" },
	{ on = "u", run = [ "unyank" ], desc = "Undo yank/cut" },
	{ on = "c", run = "plugin smart-clear -- visual select", desc = "Clear selections" },
	{ on = ".", run = "hidden toggle", desc = "Toggle hidden files" },

	{ on = [ "g", "r" ], run = "cd $NVIM_CWD", desc = "Go to project root" },
	{ on = [ "g", "?" ], run = "help", desc = "Open help" },
	{ on = "<C-p>", run = "plugin fzf", desc = "Jump to a file or directory" },

	# Move without wrapping at the first or last item.
	{ on = "j", run = "arrow 1", desc = "Next file" },
	{ on = "<Down>", run = "arrow 1", desc = "Next file" },
	{ on = "k", run = "arrow -1", desc = "Previous file" },
	{ on = "<Up>", run = "arrow -1", desc = "Previous file" },

	# Select the hovered item and move with J/K.
	{ on = "J", run = [ "toggle", "arrow 1" ], desc = "Toggle selection and move down" },
	{ on = "<S-Down>", run = [ "toggle", "arrow 1" ], desc = "Toggle selection and move down" },
	{ on = "K", run = [ "toggle", "arrow -1" ], desc = "Toggle selection and move up" },
	{ on = "<S-Up>", run = [ "toggle", "arrow -1" ], desc = "Toggle selection and move up" },

	# Use y as a prefix while keeping Yazi's native operations.
	{ on = "y", run = "noop" },
	{ on = [ "y", "y" ], run = "yank", desc = "Yank selected files" },
	{ on = [ "y", "p" ], run = "plugin yank-md-link", desc = "Yank markdown links" },
	{ on = [ "y", "P" ], run = [ "copy path", "plugin notify-copy -- path" ], desc = "Yank absolute paths" },
	{ on = [ "y", "d" ], run = [ "copy dirname", "plugin notify-copy -- dirname" ], desc = "Yank containing directory paths" },
	{ on = [ "y", "f" ], run = [ "copy filename", "plugin notify-copy -- filename" ], desc = "Yank filenames" },
	{ on = [ "y", "n" ], run = [ "copy name_without_ext", "plugin notify-copy -- name_without_ext" ], desc = "Yank filenames without extensions" },

	# Use d as a file-operation prefix.
	{ on = "d", run = "noop" },
	{ on = [ "d", "d" ], run = "yank --cut", desc = "Cut selected files" },
	{ on = [ "d", "t" ], run = "remove", desc = "Move selected files to Trash" },
	{ on = [ "d", "D" ], run = "remove --permanently", desc = "Permanently delete selected files" },

	{ on = "<Space>", run = "shell --orphan 'sh \"$HOME/.config/zsh/scripts/quick-look.sh\" %h'", desc = "Quick Look the hovered file" },
	{ on = "<C-y>", run = "shell --orphan 'sh \"$HOME/.config/zsh/scripts/quick-look.sh\" %h'", desc = "Quick Look the hovered file" },

	{ on = [ "T", "t" ], run = "shell --orphan 'sh \"$HOME/.config/yazi/scripts/tmux-new-window.sh\" %h'", desc = "Open a tmux window here" },
	{ on = [ "T", "n" ], run = "shell --orphan 'sh \"$HOME/.config/yazi/scripts/tmux-new-session.sh\" %h'", desc = "Create and switch to a tmux session" },
]

[input]
prepend_keymap = [
	{ on = "<Esc>", run = "close", desc = "Cancel input" },
]
