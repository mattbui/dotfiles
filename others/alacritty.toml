[[keyboard.bindings]]
action = "ToggleViMode"
key = "Space"
mode = "~Search"
mods = "Alt|Shift"

[[keyboard.bindings]]
action = "ScrollToBottom"
key = "Space"
mode = "Vi|~Search"
mods = "Alt|Shift"

[[keyboard.bindings]]
chars = "\u001B "
key = "Space"
mods = "Alt"

[[hints.enabled]]
command = "open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "Command|Shift" }
binding = { key = "O", mods = "Command|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Escape"
mode = "Vi|~Search"

# \u001B is ESC; ESC plus a key is how terminals encode Alt-key chords.
[[keyboard.bindings]]
chars = "\u001Bj"
key = "J"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bk"
key = "K"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bh"
key = "H"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bl"
key = "L"
mods = "Alt"

# Karabiner maps tapped Command-H to F13 so held Command-H can still hide apps.
# Command/F13/J/K/L send tmux user-key sequences for directional splits.
[[keyboard.bindings]]
chars = "\u001B[9001u"
key = "F13"

[[keyboard.bindings]]
chars = "\u001B[9002u"
key = "J"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9003u"
key = "K"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9004u"
key = "L"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001Bq"
key = "Q"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bn"
key = "N"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bu"
key = "U"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bb"
key = "Left"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bf"
key = "Right"
mods = "Alt"

# Ctrl-6 sends RS (Record Separator), ASCII 0x1E.
[[keyboard.bindings]]
chars = "\u001E"
key = "Key6"
mods = "Control"

# Ctrl-Q sends DC1/XON, ASCII 0x11.
[[keyboard.bindings]]
chars = "\u0011"
key = "Q"
mods = "Control"

# Ctrl-W sends ETB, ASCII 0x17.
[[keyboard.bindings]]
chars = "\u0017"
key = "Back"
mods = "Alt"

# Ctrl-U sends NAK, ASCII 0x15.
[[keyboard.bindings]]
chars = "\u0015"
key = "Back"
mods = "Command"

# Command-N sends Alt-N for tmux session creation.
[[keyboard.bindings]]
chars = "\u001Bn"
key = "N"
mods = "Command"

# Command-Shift-N creates a new Alacritty window.
[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Command|Shift"

# Command-W sends Alt-W for tmux window close.
[[keyboard.bindings]]
chars = "\u001Bw"
key = "W"
mods = "Command"

# Ctrl-Q sends DC1/XON, ASCII 0x11.
[[keyboard.bindings]]
chars = "\u0011"
key = "Q"
mods = "Command"

# Command-T sends Alt-T for tmux window creation.
[[keyboard.bindings]]
chars = "\u001Bt"
key = "T"
mods = "Command"

# Ctrl+- sends US (Unit Separator), ASCII 0x1F.
[[keyboard.bindings]]
chars = "\u001F"
key = "Z"
mods = "Command"

# Command-number sends tmux user-key sequences for direct window selection.
[[keyboard.bindings]]
chars = "\u001B[9011u"
key = "Key1"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9012u"
key = "Key2"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9013u"
key = "Key3"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9014u"
key = "Key4"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9015u"
key = "Key5"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9016u"
key = "Key6"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9017u"
key = "Key7"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9018u"
key = "Key8"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9019u"
key = "Key9"
mods = "Command"

# Command-P sends Alt-P for tmux pane picker.
[[keyboard.bindings]]
chars = "\u001Bp"
key = "P"
mods = "Command"

# Ctrl-Tab switches to the last tmux session.
[[keyboard.bindings]]
chars = "\u001B[9020u"
key = "Tab"
mods = "Control"

# Command-D sends a tmux user key for revdiff popup.
[[keyboard.bindings]]
chars = "\u001B[9005u"
key = "D"
mods = "Command"

# Command-Shift-M sends CSI-u Alt-Shift-M for pi model picker.
[[keyboard.bindings]]
chars = "\u001B[109;4u"
key = "M"
mods = "Command|Shift"

# Ctrl-Shift-L sends CSI-u Ctrl-Shift-L for pi tree label filter.
[[keyboard.bindings]]
chars = "\u001B[108;6u"
key = "L"
mods = "Control|Shift"

# Shift-Enter sends CSI-u Shift-Enter for terminal apps like pi.
[[keyboard.bindings]]
key = "Enter"
mods = "Shift"
chars = "\u001b[13;2u"

# Command-Enter sends CSI-u Alt-Enter for terminal apps like pi.
[[keyboard.bindings]]
chars = "\u001B[13;3u"
key = "Enter"
mods = "Command"

# Command-Shift-Enter sends CSI-u Shift-Alt-Enter for pi follow-up messages.
[[keyboard.bindings]]
chars = "\u001B[13;4u"
key = "Enter"
mods = "Command|Shift"

[[colors.indexed_colors]]
color = "#ff9e64"
index = 16

[[colors.indexed_colors]]
color = "#db4b4b"
index = 17

[colors.bright]
black = "#414868"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
white = "#c0caf5"
yellow = "#e0af68"

[colors.normal]
black = "#1d202f"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
white = "#a9b1d6"
yellow = "#e0af68"

[colors.primary]
background = "#24283b"
foreground = "#c0caf5"

[cursor.style]
blinking = "Off"
shape = "Block"

[cursor.vi_mode_style]
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 14.5

[font.bold]
style = "Light"

[font.bold_italic]
style = "Light Italic"

[font.italic]
style = "Light Italic"

[font.normal]
family = "JetBrainsMonoNL Nerd Font Mono"
style = "Light"

[font.offset]
x = 0
y = 0

[scrolling]
history = 10000
multiplier = 5

[window]
decorations = "buttonless"
dynamic_padding = true
option_as_alt = "Both"

[window.dimensions]
columns = 120
lines = 30

[window.padding]
x = 8
y = 8

