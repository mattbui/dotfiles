# Core terminal settings
[env]
TERM = "alacritty"
TERM_APP_NAME = "Alacritty"

[window]
decorations = "buttonless"
dynamic_padding = true
option_as_alt = "Both"

[window.dimensions]
columns = 120
lines = 30

[window.padding]
x = 8
y = 8

[font]
# 34 inch 2k monitor
# size = 14.5
# Built-in display
size = 13

# use `defaults write -g AppleFontSmoothing -int 0/1/2/3` (all apps)
# or `defaults write org.alacritty AppleFontSmoothing -int 0/1/2/3`
# to adjust the thick rendering in Alacritty
# https://github.com/alacritty/alacritty/pull/6186
# current font style are adjusted for `0`
[font.normal]
family = "JetBrainsMonoNL Nerd Font Propo"
style = "Regular"

[font.bold]
style = "SemiBold"

[font.italic]
style = "Italic"

[font.bold_italic]
style = "SemiBold Italic"

[font.offset]
x = 0
y = 0

[scrolling]
history = 10000
multiplier = 5

[cursor.style]
blinking = "Off"
shape = "Beam"

[cursor.vi_mode_style]
shape = "Block"

# Theme: Tokyo Night Storm
[colors.primary]
background = "#24283b"
foreground = "#c0caf5"

[colors.normal]
black = "#1d202f"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
white = "#a9b1d6"
yellow = "#e0af68"

[colors.bright]
black = "#414868"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
white = "#c0caf5"
yellow = "#e0af68"

[[colors.indexed_colors]]
color = "#ff9e64"
index = 16

[[colors.indexed_colors]]
color = "#db4b4b"
index = 17

# URL hints
[[hints.enabled]]
command = "open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "Command|Shift" }
binding = { key = "O", mods = "Command|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|codex://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"

# Keyboard: Vi/search mode
[[keyboard.bindings]]
action = "ToggleViMode"
key = "Space"
mode = "~Search"
mods = "Alt|Command"

[[keyboard.bindings]]
action = "ScrollToBottom"
key = "Space"
mode = "Vi|~Search"
mods = "Alt|Shift"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Escape"
mode = "Vi|~Search"

# Keyboard: Option/Alt compatibility
# \u001B is ESC; ESC plus a key is how terminals encode Alt-key chords.
[[keyboard.bindings]]
chars = "\u001B "
key = "Space"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bj"
key = "J"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bk"
key = "K"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bh"
key = "H"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bl"
key = "L"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bq"
key = "Q"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bn"
key = "N"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bu"
key = "U"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bb"
key = "Left"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bf"
key = "Right"
mods = "Alt"

# Keyboard: tmux panes/windows/sessions
# Karabiner maps tapped Command-H to F13 so held Command-H can still hide apps.
# Command/F13/J/K/L send tmux user-key sequences for directional splits.
[[keyboard.bindings]]
chars = "\u001B[9001u"
key = "F13"

[[keyboard.bindings]]
chars = "\u001B[9002u"
key = "J"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9003u"
key = "K"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9004u"
key = "L"
mods = "Command"

# Command-D sends a tmux user key for revdiff popup.
[[keyboard.bindings]]
chars = "\u001B[9005u"
key = "D"
mods = "Command"

# Command-N sends a tmux user key for tmux session creation.
[[keyboard.bindings]]
chars = "\u001B[9026u"
key = "N"
mods = "Command"

# Command-Shift-N creates a new Alacritty window.
[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Command|Shift"

# Command-W sends a tmux user key for tmux pane/window close.
[[keyboard.bindings]]
chars = "\u001B[9027u"
key = "W"
mods = "Command"

# Command-T sends a tmux user key for tmux window creation.
[[keyboard.bindings]]
chars = "\u001B[9028u"
key = "T"
mods = "Command"

# Command-O sends a tmux user key for a Yazi popup.
[[keyboard.bindings]]
chars = "\u001B[9029u"
key = "O"
mods = "Command"

# Command-P sends a tmux user key for the Sesh project/session picker.
[[keyboard.bindings]]
chars = "\u001B[9022u"
key = "P"
mods = "Command"

# Ctrl-Tab / Ctrl-Shift-Tab cycle tmux sessions.
[[keyboard.bindings]]
chars = "\u001B[9020u"
key = "Tab"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001B[9021u"
key = "Tab"
mods = "Control|Shift"

# Karabiner sends F18 on Ctrl release after Ctrl-Tab session cycling.
[[keyboard.bindings]]
chars = "\u001B[9024u"
key = "F18"

# Ctrl-Enter sends a tmux user key for pane zoom.
[[keyboard.bindings]]
chars = "\u001B[9025u"
key = "Enter"
mods = "Control"

# Keyboard: tmux direct window selection
# Command-number sends tmux user-key sequences for direct window selection.
[[keyboard.bindings]]
chars = "\u001B[9011u"
key = "Key1"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9012u"
key = "Key2"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9013u"
key = "Key3"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9014u"
key = "Key4"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9015u"
key = "Key5"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9016u"
key = "Key6"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9017u"
key = "Key7"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9018u"
key = "Key8"
mods = "Command"

[[keyboard.bindings]]
chars = "\u001B[9019u"
key = "Key9"
mods = "Command"

# Keyboard: Pi/app-specific CSI-u sequences
# Command-Shift-M sends CSI-u Alt-Shift-M for pi model picker.
[[keyboard.bindings]]
chars = "\u001B[109;4u"
key = "M"
mods = "Command|Shift"

# Ctrl-Shift-L sends CSI-u Ctrl-Shift-L for pi tree label filter.
[[keyboard.bindings]]
chars = "\u001B[108;6u"
key = "L"
mods = "Control|Shift"

# Shift-Enter sends CSI-u Shift-Enter for terminal apps like pi.
[[keyboard.bindings]]
chars = "\u001b[13;2u"
key = "Enter"
mods = "Shift"

# Command-Enter sends CSI-u Alt-Enter for terminal apps like pi.
[[keyboard.bindings]]
chars = "\u001B[13;3u"
key = "Enter"
mods = "Command"

# Command-Shift-Enter sends CSI-u Shift-Alt-Enter for pi follow-up messages.
[[keyboard.bindings]]
chars = "\u001B[13;4u"
key = "Enter"
mods = "Command|Shift"

# Keyboard: control-character compatibility
# Ctrl-6 sends RS (Record Separator), ASCII 0x1E.
[[keyboard.bindings]]
chars = "\u001E"
key = "Key6"
mods = "Control"

# Ctrl-Q sends DC1/XON, ASCII 0x11.
[[keyboard.bindings]]
chars = "\u0011"
key = "Q"
mods = "Control"

# Alt-Backspace sends ETB/Ctrl-W, ASCII 0x17.
[[keyboard.bindings]]
chars = "\u0017"
key = "Back"
mods = "Alt"

# Command-Backspace sends NAK/Ctrl-U, ASCII 0x15.
[[keyboard.bindings]]
chars = "\u0015"
key = "Back"
mods = "Command"

# Command-Q sends DC1/XON, ASCII 0x11.
[[keyboard.bindings]]
chars = "\u0011"
key = "Q"
mods = "Command"

# Command-Z sends US/Ctrl-_, ASCII 0x1F.
[[keyboard.bindings]]
chars = "\u001F"
key = "Z"
mods = "Command"

# Command-Shift-Z sends Ctrl-X Ctrl-R for zsh redo.
[[keyboard.bindings]]
chars = "\u0018\u0012"
key = "Z"
mods = "Command|Shift"
