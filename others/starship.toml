"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
${custom.agent_worktree}\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
($username$hostname )\
$all\
$cmd_duration\
$line_break\
$jobs\
$character"""

[character]
success_symbol = "[ÔåÆ](green)"
error_symbol = "[ÔåÆ](red)"
vimcmd_symbol = "[ÔåÉ](green)"
vimcmd_visual_symbol = "[ÔåÉ](yellow)"
vimcmd_replace_symbol = "[ÔåÉ](purple)"
vimcmd_replace_one_symbol = "[ÔåÉ](purple)"

[username]
format = "[$user]($style)"
style_user = "white dimmed"
style_root = "red"

[hostname]
format = "[@$hostname]($style)"
style = "white dimmed"

[directory]
style = "blue"
read_only = " ¾░î¥"

[git_branch]
symbol = "¯£Ñ "
style = "purple"
only_attached = true

[git_commit]
format = "on [´Éù $hash$tag]($style) "
style = "purple"
only_detached = true
tag_disabled = false
tag_symbol = " ´ÉÆ "

[git_state]
style = "yellow"

[git_status]
style = "red"
format = "([$all_status$ahead_behind]($style))"
conflicted = "[=${count}](red) "
ahead = "[Ôçí${count}](green) "
behind = "[Ôçú${count}](yellow) "
diverged = "[Ôçí${ahead_count}](green)[Ôçú${behind_count}](yellow) "
untracked = "[?${count}](cyan) "
stashed = '[*${count}](purple) '
modified = "[!${count}](yellow) "
staged = "[+${count}](green) "
renamed = "[~${count}](yellow) "
deleted = "[-${count}](red) "

[aws]
format = "on [($profile )($region )($duration )]($style)"
symbol = ""
style = "yellow"

[bun]
symbol = "¯Ø» "
style = "red"

[deno]
symbol = "¯ƒÇ "
style = "green"

[nodejs]
symbol = "¯£ÿ "
style = "green"
not_capable_style = "red"

[package]
symbol = "¾░Åù "
style = "yellow"

[python]
symbol = "¯êÁ "
style = "blue"
generic_venv_names = [".venv", "venv"]

[jobs]
style = "blue"

[cmd_duration]
style = "white dimmed"

[fill]
symbol = " "
style = ""

[custom.agent_worktree]
command = '''
root=$(git rev-parse --show-toplevel 2>/dev/null) || exit 0
git_dir=$(git rev-parse --git-dir 2>/dev/null) || exit 0
common_dir=$(git rev-parse --git-common-dir 2>/dev/null) || exit 0
test "$git_dir" = "$common_dir" && exit 0

case "$common_dir" in
  */.git)
    project_dir=${common_dir%/.git}
    project=${project_dir##*/}
    ;;
  */.bare)
    project_dir=${common_dir%/.bare}
    project=${project_dir##*/}
    ;;
  *)
    project=${common_dir##*/}
    project=${project%.git}
    ;;
esac

case "$root" in
  "$HOME"/.codex/worktrees/*/*) agent=codex ;;
  */.claude/worktrees/*) agent=claude ;;
  *) agent= ;;
esac

if test -n "$agent" && test -n "$project"; then
  printf '%s/%s' "$agent" "$project"
elif test -n "$agent"; then
  printf '%s' "$agent"
elif test -n "$project"; then
  printf '%s' "$project"
fi
'''
when = true
require_repo = true
format = '([$symbol$output]($style) )'
symbol = "¾░â╗ "
style = "cyan dimmed"
shell = ["sh"]
