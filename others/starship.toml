"$schema" = "https://starship.rs/config-schema.json"

# cmd-footer already handle dynamically adding newline before the prompt, check init.zsh
add_newline = false

format = """
$directory\
${custom.agent_worktree}\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
($username$hostname )\
$all\
$line_break\
$jobs\
$character"""

[profiles]
# this will be rendered as part of the previous command output to show:
# status, completion time, and optionally duration
cmd-footer = "${env_var.STARSHIP_CMD_OK}${env_var.STARSHIP_CMD_ERR}$cmd_duration"

[env_var.STARSHIP_CMD_OK]
format = "[âœ“](green) at [$env_value]($style)"
style = "white dimmed"

[env_var.STARSHIP_CMD_ERR]
format = "[âœ—](red) at [$env_value]($style)"
style = "white dimmed"

[cmd_duration]
min_time = 2000
format = " آ· took [$duration]($style)"
style = "white dimmed"

[character]
success_symbol = "[â†’](purple)"
error_symbol = "[â†’](purple)"
vimcmd_symbol = "[â†گ](yellow)"

[username]
format = "[$user]($style)"
style_user = "white dimmed"
style_root = "red"

[hostname]
format = "[@$hostname]($style)"
style = "white dimmed"

[directory]
style = "blue"
read_only = " َ°Œ¾"

[git_branch]
symbol = "îœ¥ "
style = "purple"
only_attached = true

[git_commit]
format = "on [ïگ— $hash$tag]($style) "
style = "purple"
only_detached = true
tag_disabled = false
tag_symbol = " ïگ’ "

[git_state]
style = "yellow"

[git_status]
style = "red"
format = "([$all_status$ahead_behind]($style))"
conflicted = "[=${count}](red) "
ahead = "[â‡،${count}](green) "
behind = "[â‡£${count}](yellow) "
diverged = "[â‡،${ahead_count}](green)[â‡£${behind_count}](yellow) "
untracked = "[?${count}](cyan) "
stashed = '[*${count}](purple) '
modified = "[!${count}](yellow) "
staged = "[+${count}](green) "
renamed = "[~${count}](yellow) "
deleted = "[-${count}](red) "

[aws]
format = "on [($profile )($region )($duration )]($style)"
symbol = ""
style = "yellow"

[bun]
symbol = "î‌¯ "
style = "red"

[deno]
symbol = "îں€ "
style = "green"

[nodejs]
symbol = "îœک "
style = "green"
not_capable_style = "red"

[package]
symbol = "َ°ڈ— "
style = "yellow"

[python]
symbol = "îˆµ "
style = "blue"
generic_venv_names = [".venv", "venv"]

[jobs]
style = "blue"

[fill]
symbol = " "
style = ""

[custom.agent_worktree]
command = '''
root=$(git rev-parse --show-toplevel 2>/dev/null) || exit 0
git_dir=$(git rev-parse --git-dir 2>/dev/null) || exit 0
common_dir=$(git rev-parse --git-common-dir 2>/dev/null) || exit 0

# Normalize relative and absolute paths before checking for a linked worktree.
git_dir=$(CDPATH= cd "$git_dir" 2>/dev/null && pwd -P) || exit 0
common_dir=$(CDPATH= cd "$common_dir" 2>/dev/null && pwd -P) || exit 0

test "$git_dir" = "$common_dir" && exit 0

case "$common_dir" in
  */.git)
    project_dir=${common_dir%/.git}
    project=${project_dir##*/}
    ;;
  */.bare)
    project_dir=${common_dir%/.bare}
    project=${project_dir##*/}
    ;;
  *)
    project=${common_dir##*/}
    project=${project%.git}
    ;;
esac

case "$root" in
  "$HOME"/.codex/worktrees/*/*) agent=codex ;;
  */.claude/worktrees/*) agent=claude ;;
  *) agent= ;;
esac

if test -n "$agent" && test -n "$project"; then
  printf '%s/%s' "$agent" "$project"
elif test -n "$agent"; then
  printf '%s' "$agent"
elif test -n "$project"; then
  printf '%s' "$project"
fi
'''
when = true
require_repo = true
format = '([$symbol$output]($style) )'
symbol = "َ°ƒ» "
style = "cyan dimmed"
shell = ["sh"]
