# Use Ctrl-Space as tmux leader/prefix, except in SSH sessions.
if-shell 'test -z "${SSH_CONNECTION}${SSH_CLIENT}${SSH_TTY}"' {
  unbind C-b
  set -g prefix C-Space
  bind-key C-Space send-prefix
}

# detach still work if hold Ctrl
bind-key C-d detach-client

# Choose tree
# Alacritty/Ghostty map Command-P to User16 for the Sesh project/session picker.
set -s user-keys[16] "\e[9022u"

# Keep both branches in strings so older tmux versions do not parse unsupported
# flags and formats from the modern bindings.
if-shell "'${HOME}/.config/tmux/scripts/tmux-min-version.sh' 3.6" \
  "bind-key p choose-tree -Zw -F '#{E:@choose_tree_format}' -K '#{E:@choose_tree_key_format}' ; \
   bind-key P choose-tree -Zs -F '#{E:@choose_tree_format}' -K '#{E:@choose_tree_key_format}' ; \
   bind-key C-p choose-tree -Zw -F '#{E:@choose_tree_format}' -K '#{E:@choose_tree_key_format}'" \
  "bind-key p choose-tree -w -F '#{E:@choose_tree_format}' ; \
   bind-key P choose-tree -s -F '#{E:@choose_tree_format}' ; \
   bind-key C-p choose-tree -w -F '#{E:@choose_tree_format}'"

# Open a project/session picker spanning tmux sessions and directories. Remove
# the previous Command-S binding when this file is re-sourced in a live server.
unbind-key -n User17
bind-key -n User16 run-shell "\"${HOME}/.config/tmux/scripts/sesh-picker.sh\""

# prefix + t to create new window
unbind t
unbind C-t
bind-key t new-window
bind-key C-t new-window

# Alacritty/Ghostty map Command-T to a tmux user key for tmux window creation.
set -s user-keys[22] "\e[9028u"
bind-key -n User22 new-window

# Alacritty/Ghostty map Command-O to a tmux user key for a Yazi popup.
set -s user-keys[23] "\e[9029u"
if-shell 'tmux list-commands display-popup >/dev/null 2>&1' \
  'bind-key -n User23 display-popup -E -T "Yazi" -d "#{pane_current_path}" -w 90% -h 60% "YAZI_TMUX_POPUP=1 yazi"' \
  'bind-key -n User23 new-window -c "#{pane_current_path}" "yazi"'

# Alacritty maps Command-N to a tmux user key for nested tmux sessions.
set -s user-keys[20] "\e[9026u"
bind-key -n User20 command-prompt -p "Session name:" \
  "new-session -A -s \"%%%\" -c \"#{pane_current_path}\""

# prefix + w to kill pane
unbind w
unbind C-w
bind-key w kill-pane
bind-key C-w kill-pane

# Alacritty maps Command-W to a tmux user key for tmux pane/window close.
set -s user-keys[21] "\e[9027u"
bind-key -n User21 if-shell -F \
  '#{||:#{!=:#{pane_current_command},#{b:default-shell}},#{&&:#{==:#{window_panes},1},#{==:#{session_windows},1}}}' \
  'confirm-before -p "#{?#{!=:#{pane_current_command},#{b:default-shell}},#{pane_current_command} is running.,Last pane in session: #{session_name}.} Confirm to close? (y/n)" kill-pane' \
  'kill-pane'

# prefix + Q to kill session
unbind Q
bind-key Q kill-session

unbind J
bind-key -r J next-window
unbind K
bind-key -r K previous-window

# Alacritty maps Command-number to tmux user keys for direct window selection.
set -s user-keys[5] "\e[9011u"
set -s user-keys[6] "\e[9012u"
set -s user-keys[7] "\e[9013u"
set -s user-keys[8] "\e[9014u"
set -s user-keys[9] "\e[9015u"
set -s user-keys[10] "\e[9016u"
set -s user-keys[11] "\e[9017u"
set -s user-keys[12] "\e[9018u"
set -s user-keys[13] "\e[9019u"
bind-key -n User5 select-window -t:=1
bind-key -n User6 select-window -t:=2
bind-key -n User7 select-window -t:=3
bind-key -n User8 select-window -t:=4
bind-key -n User9 select-window -t:=5
bind-key -n User10 select-window -t:=6
bind-key -n User11 select-window -t:=7
bind-key -n User12 select-window -t:=8
bind-key -n User13 select-window -t:=9

# Alacritty maps Ctrl-Tab / Ctrl-Shift-Tab to tmux user keys for MRU session cycling.
set -s user-keys[14] "\e[9020u"
set -s user-keys[15] "\e[9021u"
set -s user-keys[18] "\e[9024u"
bind-key -n User14 run-shell "\"${HOME}/.config/tmux/scripts/switch-session-mru.sh\" next"
bind-key -n User15 run-shell "\"${HOME}/.config/tmux/scripts/switch-session-mru.sh\" prev"
bind-key -n User18 run-shell "\"${HOME}/.config/tmux/scripts/switch-session-mru.sh\" finalize"
bind-key Tab run-shell "\"${HOME}/.config/tmux/scripts/switch-session-mru.sh\" next"
bind-key BTab run-shell "\"${HOME}/.config/tmux/scripts/switch-session-mru.sh\" prev"

unbind space
bind-key space copy-mode

# Alt-Space enters tmux copy/scroll mode.
bind-key -n M-Space copy-mode

# Alacritty maps Command-H/J/K/L to tmux user keys for directional splits.
set -s user-keys[0] "\e[9001u"
set -s user-keys[1] "\e[9002u"
set -s user-keys[2] "\e[9003u"
set -s user-keys[3] "\e[9004u"
bind-key -n User0 split-window -h -b -l 50% -c "#{pane_current_path}"
bind-key -n User1 split-window -v -l 40% -c "#{pane_current_path}"
bind-key -n User2 split-window -v -b -l 50% -c "#{pane_current_path}"
bind-key -n User3 split-window -h -l 45% -c "#{pane_current_path}"

# Alacritty maps Command-D to a tmux user key for a revdiff popup that copies annotations.
set -s user-keys[4] "\e[9005u"
bind-key -n User4 run-shell "sh \"${HOME}/.config/tmux/scripts/revdiff-popup.sh\" --clipboard -- HEAD"

bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5

# prefix + R to reload/source tmux settings
bind-key R source ~/.tmux.conf

# Forward Ctrl-_ / Ctrl-- as raw 0x1f for terminal apps like pi undo.
bind-key -n C-_ send-keys -H 1f

# toggle maximize current window
bind-key enter resize-pane -Z

# Alacritty maps Ctrl-Enter to a tmux user key for pane zoom.
set -s user-keys[19] "\e[9025u"
bind-key -n User19 resize-pane -Z

# use esc key in copy-mode-vi
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi i send-keys -X cancel

# vim-like selection copy-mode
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi C-v send -X begin-selection \; send -X rectangle-toggle
if-shell -b 'test $(uname) = "Linux"' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'
if-shell -b 'test $(uname) = "Darwin"' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'
