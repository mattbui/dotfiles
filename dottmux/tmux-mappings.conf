# detach still work if hold Ctrl
bind-key C-d detach-client

# Ctrl + b + f to find-window
unbind f
bind-key C-f command-prompt "find-window -Z -- '%%'"

# Ctrl + b + t to create new window
unbind n
unbind C-n
bind-key n new-window
bind-key C-n new-window
bind-key -n M-n new-window

# Alacritty maps Command-T/Command-N to tmux user keys.
set -s user-keys[1] "\e[100~"
set -s user-keys[2] "\e[101~"
bind-key -n User1 new-window
bind-key -n User2 display-popup -E -T 'New tmux session' -d "#{pane_current_path}" -w 60 -h 7 'sh "${HOME}/.config/tmux/scripts/new-session-popup.sh"'

# Ctrl + b + w to kill window
unbind w
unbind C-w
bind-key w kill-window
bind-key C-w kill-window
bind-key -n M-w kill-window

# Ctrl + b + q to kill panes
unbind q
unbind C-q
bind-key q kill-pane
bind-key C-q kill-pane

# Ctrl + b, Q to kill session
unbind Q
bind-key Q kill-session

unbind J
bind-key -r J next-window
unbind K
bind-key -r K previous-window

# Alacritty maps Command-number to Alt-number for direct window selection.
bind-key -n M-1 select-window -t:=1
bind-key -n M-2 select-window -t:=2
bind-key -n M-3 select-window -t:=3
bind-key -n M-4 select-window -t:=4
bind-key -n M-5 select-window -t:=5
bind-key -n M-6 select-window -t:=6
bind-key -n M-7 select-window -t:=7
bind-key -n M-8 select-window -t:=8
bind-key -n M-9 select-window -t:=9

unbind space
bind-key space copy-mode

# better splitting
bind "\\" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
set-hook -g after-new-window 'select-pane -T ""'
set-hook -g after-split-window 'select-pane -T ""'

# bind-key -r M-h resize-pane -L 5
# bind-key -r M-j resize-pane -D 5
# bind-key -r M-k resize-pane -U 5
# bind-key -r M-l resize-pane -R 5

bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5

# Ctrl + b + p to select window
bind-key p choose-tree -F '#{?window_bell_flag,#[fg=#e0af68][!] #[default],}#[fg=#{?window_active,#bb9af7,#565f89}]#{?#{m:codex*,#{pane_current_command}},codex,#{pane_current_command}}#[default] #[fg=#565f89]| #[fg=#{?window_active,#7aa2f7,#565f89}]#{?#{==:#{pane_current_command},ssh},#{pane_title},#{?#{m:codex*,#{pane_current_command}},#{b:pane_current_path}#{?pane_title, | #{pane_title},},#{b:pane_current_path}}}#[default]'
bind-key C-p choose-tree -F '#{?window_bell_flag,#[fg=#e0af68][!] #[default],}#[fg=#{?window_active,#bb9af7,#565f89}]#{?#{m:codex*,#{pane_current_command}},codex,#{pane_current_command}}#[default] #[fg=#565f89]| #[fg=#{?window_active,#7aa2f7,#565f89}]#{?#{==:#{pane_current_command},ssh},#{pane_title},#{?#{m:codex*,#{pane_current_command}},#{b:pane_current_path}#{?pane_title, | #{pane_title},},#{b:pane_current_path}}}#[default]'
bind-key -n M-p choose-tree -F '#{?window_bell_flag,#[fg=#e0af68][!] #[default],}#[fg=#{?window_active,#bb9af7,#565f89}]#{?#{m:codex*,#{pane_current_command}},codex,#{pane_current_command}}#[default] #[fg=#565f89]| #[fg=#{?window_active,#7aa2f7,#565f89}]#{?#{==:#{pane_current_command},ssh},#{pane_title},#{?#{m:codex*,#{pane_current_command}},#{b:pane_current_path}#{?pane_title, | #{pane_title},},#{b:pane_current_path}}}#[default]'
set -s user-keys[0] "\e[99~"
bind-key -n User0 run-shell "${HOME}/.config/tmux/scripts/choose-tree-split-toggle.sh"

# Ctrl + b S to source tmux settings
bind-key S source ~/.tmux.conf

# toggle maximize current window
bind-key enter resize-pane -Z

# use esc key in copy-mode-vi
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi i send-keys -X cancel

# vim-like selection copy-mode
bind -T copy-mode-vi 'v' send -X begin-selection
if-shell -b 'test $(uname) = "Linux"' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'
if-shell -b 'test $(uname) = "Darwin"' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'
