set -g default-terminal "tmux-256color"
set -g allow-passthrough on

set -asq terminal-features ",alacritty:RGB:usstyle:extkeys:hyperlinks"
set -asq terminal-features ",xterm-ghostty:RGB:usstyle:extkeys:hyperlinks"

# Copy terminal identity from the client environment into tmux sessions on create/attach.
set -ga update-environment " TERM"
set -ga update-environment " TERM_PROGRAM"
set -ga update-environment " TERM_APP_NAME"

set -s escape-time 0

# Forward modified keys (e.g. Alt/Shift/Ctrl+Enter) to terminal apps like pi.
# Use -q so older tmux versions ignore unsupported extended-key options.
set -gq extended-keys on
set -gq extended-keys-format csi-u

set -sg repeat-time 600

set -g history-limit 50000

set -g display-time 4000

set -g status-interval 1

# window/pane index start from 1
set -g base-index 1
set -g pane-base-index 1

set -g set-titles on
set -g set-titles-string '#S | #{pane_current_command} | #{b:pane_current_path}'
setw -gq allow-set-title off

# focus events enabled for terminals that support them
set -g focus-events on

# super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# When the attached session is closed, switch to another session instead of
# detaching/exiting the tmux client, as long as another session exists.
set -g detach-on-destroy off

# enable mouse mode
setw -g mouse on

# emacs keybindings in command prompt
set -g status-keys emacs

# vim keybinding in copy mode
setw -g mode-keys vi

if-shell "test -f ${HOME}/.config/tmux/tmux-mappings.conf" "source ${HOME}/.config/tmux/tmux-mappings.conf"
if-shell "test -f ${HOME}/.config/tmux/tmux-session-switch-hooks.conf" "source ${HOME}/.config/tmux/tmux-session-switch-hooks.conf"
if-shell "test -f ${HOME}/.config/tmux/tmux-vim-nav.conf" "source ${HOME}/.config/tmux/tmux-vim-nav.conf"
if-shell "test -f ${HOME}/.config/tmux/tmux-ui.conf" "source ${HOME}/.config/tmux/tmux-ui.conf"

# Continuum configs
set -g @continuum-restore 'on'

# Easymotion configs
set -g @easy-motion-prefix "f"
set -g @easy-motion-default-motion "bd-w"

# Suspend configs
set -g @suspend_key 'F4'

# prompt to display when tmux prefix key is pressed
set -g @mode_indicator_prefix_prompt ' WAIT '

# prompt to display when tmux is in copy mode
set -g @mode_indicator_copy_prompt ' COPY '

# prompt to display when tmux has synchronized panes
set -g @mode_indicator_sync_prompt ' SYNC '

# prompt to display when tmux is in normal mode
set -g @mode_indicator_empty_prompt ' TMUX '

# List of plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'MunifTanjim/tmux-suspend'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
