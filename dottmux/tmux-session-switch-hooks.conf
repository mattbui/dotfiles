# Session MRU tracking and switch indicator updates.
set-hook -g client-session-changed 'run-shell -b "\"${HOME}/.config/tmux/scripts/update-session-access.sh\""'
set-hook -g session-created 'run-shell -b "\"${HOME}/.config/tmux/scripts/update-session-indicators.sh\""'
set-hook -g session-closed 'run-shell -b "\"${HOME}/.config/tmux/scripts/update-session-indicators.sh\""'
