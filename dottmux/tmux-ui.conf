#+---------+
#+ Plugins +
#+---------+
set -g @prefix_highlight_show_copy_mode "on"
set -g @prefix_highlight_show_sync_mode "on"

set -g @prefix_highlight_prefix_prompt 'Prefix'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_sync_prompt 'Sync'

#+--------+
#+ Status +
#+--------+
#+--- Layout ---+
set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g status-right-length "100"
set -g status-left-length "100"

#+--- Bars ---+
set -g status-right-style "none"

# TokyoNightStorm
set -g status-style "none,fg=#7aa2f7,bg=#1f2335"
set -g status-left "#[fg=#1d202f,bg=#7aa2f7] #{@session_title_indicator}#[fg=#292e42,bg=#7aa2f7]🮇"
set -g status-right "#[fg=#7aa2f7,bg=#1f2335]#{tmux_mode_indicator}#[fg=#7aa2f7,bg=#3b4261] %a %b %d #[fg=#1d202f,bg=#7aa2f7] %H:%M:%S "

#+--- Windows ---+
# TokyoNightStorm
set -g @pane_context_label '#{?#{@pi_session_active},pi,#{?#{@codex_session_active},codex,#{?#{@ssh_session_active},ssh,#{pane_current_command}}}}'
set -g @pane_context_title '#{?#{@pi_session_active},#{?#{@pi_session_name},#{=/23/..:@pi_session_name},#{b:pane_current_path}},#{?#{@ssh_session_active},#{@ssh_session_name},#{b:pane_current_path}}}'
set -g @pane_context_choose_title '#{?#{@pi_session_active},#{b:pane_current_path}#{?#{@pi_session_name}, | #{@pi_session_name},},#{?#{@ssh_session_active},#{@ssh_session_name},#{b:pane_current_path}}}'
set -g @choose_tree_format '#{?window_bell_flag,#[fg=#e0af68][!] #[default],}#[fg=#{?window_active,#bb9af7,#636a8d}]#{E:@pane_context_label}#[default] #[fg=#636a8d]| #[fg=#{?window_active,#7aa2f7,#636a8d}]#{E:@pane_context_choose_title}#[default]'

setw -g window-status-activity-style "none,fg=#a9b1d6,bg=#292e42"
setw -g window-status-bell-style "reverse"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#a9b1d6,bg=#292e42"
setw -g window-status-format "#{?window_bell_flag,#[none]#[fg=#1f2335]#[bg=#e0af68],#[fg=#1f2335]#[bg=#7aa2f7]} #I #[fg=#636a8d,bg=#292e42] #{?window_zoomed_flag, ,}#{E:@pane_context_label} | #{E:@pane_context_title} "
setw -g window-status-current-format "#[fg=#1f2335,bg=#bb9af7] #I #[fg=#c0caf5,bg=#1f2335] #{?window_zoomed_flag, ,}#{E:@pane_context_label} | #{E:@pane_context_title} "

#+-------+
#+ Panes +
#+-------+
# TokyoNightStorm
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-indicators colour

# +----------+
# + Messages +
# +----------+
# TokyoNightStorm
set -g mode-style "bg=#3b4261"
%if "#{>=:#{version},3.6}"
  set -g copy-mode-position-style "fg=#1d202f,bg=#e0af68"
  set -g copy-mode-selection-style "bg=#463f3f"  # 20% amber blend from bg=#e0af68
%endif
%if "#{>=:#{version},3.7}"
  set -g message-style "fg=#7aa2f7,bg=#3b4261,fill=#3b4261"
  set -g message-command-style "fg=#7aa2f7,bg=#3b4261,fill=#3b4261"
%else
  set -g message-style "fg=#7aa2f7,bg=#3b4261"
  set -g message-command-style "fg=#7aa2f7,bg=#3b4261"
%endif

#+---------------------+
#+ Tmux mode indicator +
#+---------------------+
# style values for prefix prompt
set -g @mode_indicator_prefix_mode_style 'bg=#7dcfff,fg=#1d202f'
# style values for copy prompt
set -g @mode_indicator_copy_mode_style 'bg=#e0af68,fg=#1d202f'
# style values for sync prompt
set -g @mode_indicator_sync_mode_style 'bg=#f7768e,fg=#1d202f'
# style values for empty prompt
set -g @mode_indicator_empty_mode_style 'bg=#7aa2f7,fg=#1d202f'

set -g @suspend_suspended_options " \
  @mode_indicator_custom_prompt:: ---- , \
  @mode_indicator_custom_mode_style::bg=#292e42\\,fg=#636a8d, \
"
